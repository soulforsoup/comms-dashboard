<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C-DASH Communications Dashboard</title>
  <meta name="description" content="Delivers a strategic, executive-ready communications dashboard tracking media coverage, sentiment, reputation, and stakeholder insights for corporate leaders." />
  <link rel="icon" type="image/png" href="assets/psa-logo.png" />
  
  <!-- Tailwind CSS v4 CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'blue': {
              50: '#eff6ff',
              100: '#dbeafe',
              200: '#bfdbfe',
              300: '#93c5fd',
              400: '#60a5fa',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
              800: '#1e40af',
              900: '#1e3a5f',
            },
          },
        },
      },
    }
  </script>
  
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  
  <!-- Custom styles -->
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="min-h-screen bg-gray-100">
  <!-- Top Header -->
  <header id="app-header" class="bg-white border-b border-gray-200 px-8 py-6 shadow-sm">
    <!-- Rendered by App.renderHeader() -->
  </header>

  <div class="flex">
    <!-- Left Navigation -->
    <nav id="app-nav" class="w-64 bg-white border-r border-gray-200 min-h-screen p-4">
      <!-- Rendered by App.renderNav() -->
    </nav>

    <!-- Main Content -->
    <main class="flex-1 p-6">
      <!-- Top KPI Cards -->
      <div id="app-kpis" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 xl:grid-cols-9 gap-4 mb-8">
        <!-- Rendered by App.renderKPIs() -->
      </div>

      <!-- Section Content -->
      <div id="app-main">
        <!-- Rendered by App.renderSection() -->
      </div>
    </main>
  </div>

  <!-- Scripts (order matters) -->
  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
