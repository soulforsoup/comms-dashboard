<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C-DASH — Media Intelligence Report</title>
  <meta name="description" content="Media Sentiment & Stakeholder Intelligence for PSA International" />
  <link rel="icon" type="image/png" href="assets/PSA-Logo-Favicon-192px.png" />
  
  <!-- Tailwind CSS v4 CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'blue': {
              50: '#eff6ff',
              100: '#dbeafe',
              200: '#bfdbfe',
              300: '#93c5fd',
              400: '#60a5fa',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
              800: '#1e40af',
              900: '#1e3a5f',
            },
          },
        },
      },
    }
  </script>
  
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  
  <!-- html2pdf.js for PDF export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  
  <!-- Custom styles -->
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="bg-gray-100">
  <!-- Top Header -->
  <header id="app-header" class="header">
    <!-- Rendered by App.renderHeader() -->
  </header>

  <!-- Mobile Anchor Nav -->
  <nav id="mobile-nav" class="mobile-nav">
    <!-- Rendered by App.renderMobileNav() -->
  </nav>

  <div class="layout">
    <!-- Desktop Sidebar -->
    <aside id="app-sidebar" class="sidebar">
      <!-- Rendered by App.renderSidebar() -->
    </aside>

    <!-- Main Content (all sections) -->
    <main id="app-main" class="main-content">
      <!-- All sections rendered here -->
    </main>
  </div>

  <!-- About Modal -->
  <div id="about-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2 class="text-lg text-slate-800 font-semibold">About this report</h2>
        <button id="btn-close-modal" class="text-gray-400 hover:text-gray-600 transition-colors">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div id="about-content" class="modal-body">
        <!-- Rendered by Components.aboutContent() -->
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
